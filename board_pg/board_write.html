<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Korean - Write</title>

  <!-- CSS 연결 -->
  <link rel="stylesheet" href="./board.css">

  <!-- JS 연결 : defer는 HTML을 먼저 읽은 뒤 JS를 실행하게 해줌 -->
  <script src="./board_write.js" defer></script>
</head>

<body>

<header>
  <div class="container">

    <a href="../main_pg/01main_pg.html">
      <img src="../main_pg/image/logo.png" alt="main_logo" class="logo">
    </a>

    <nav>
      <ul>
        <li><a href="../main_pg/01main_pg.html">Home</a></li>
        <li><a href="#">Course</a></li>
        <li><a href="#">Teacher</a></li>
        <li><a href="#">Price</a></li>
        <li><a href="../contact_pg/contact.html">Contact</a></li>
        <li><a href="../board_pg/board.html" class="board">Board</a></li>
        <li><a href="../member_pg/login.php" class="login_btn">로그인</a></li>
        <li><a href="../member_pg/join.php" class="join_btn">회원가입</a></li>
      </ul>
    </nav>

  </div>
</header>

<main>

  <!-- Board 상단 영역 -->
  <section id="board_visual">
    <div class="container">
      <h2>상담하기</h2>
      <p>Hello Korean 수업 문의 내용을 작성해주세요.</p>
    </div>
  </section>

  <!-- 글쓰기 영역 -->
  <section id="write_content">
    <div class="container">

      <div class="write_header">
        <h3>문의 작성</h3>
        <p>문의 내용을 남겨주시면 확인 후 답변드리겠습니다.</p>
      </div>

      <!-- 글쓰기 form 시작 -->
      <form action="#" method="post" class="write_form" onsubmit="return submitCheck()">

        <div class="form_row">
          <label for="writer">작성자</label>
          <input type="text" id="writer" name="writer" placeholder="작성자 이름을 입력하세요">
        </div>

        <div class="form_row">
          <label for="title">제목</label>
          <input type="text" id="title" name="title" placeholder="제목을 입력하세요">
        </div>

        <div class="form_row">
          <label for="category">상담 유형</label>

          <select id="category" name="category">
            <option value="">선택하기</option>
            <option value="[신규] 상담 문의">[신규] 상담 문의</option>
            <option value="[기존] 매칭 문의">[기존] 매칭 문의</option>
            <option value="[기존] DS 문의">[기존] DS 문의</option>
            <option value="[기존] 교육 문의">[기존] 교육 문의</option>
            <option value="[기타] 기타 이용 문의">[기타] 기타 이용 문의</option>
          </select>
        </div>

        <div class="form_row content_row">
          <label for="content">내용</label>
          <textarea id="content" name="content" placeholder="문의 내용을 입력하세요"></textarea>
        </div>

        <div class="form_btn">
          <button type="button" onclick="showPreview()">미리보기</button>
          <button type="submit">SUBMIT</button>
          <a href="./board.html">목록으로</a>
        </div>

      </form>
      <!-- 글쓰기 form 끝 -->


      <!-- 미리보기 영역 시작 -->
      <div class="preview_box" id="preview_box">
        <h3>미리보기</h3>

        <div class="preview_content">
          <p class="empty_text">미리보기 버튼을 누르면 작성한 내용이 여기에 표시됩니다.</p>
        </div>
      </div>
      <!-- 미리보기 영역 끝 -->

    </div>
  </section>

</main>

<footer>
  <div class="container">
    <p>© Global Link Co., Ltd. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
